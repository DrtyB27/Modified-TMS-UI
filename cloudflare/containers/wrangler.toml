# Cloudflare Containers deployment of the read-only 3G sandbox backend.
# SEPARATE, sandbox-only Worker+Container. Never the B.R.A.T. production Worker.
#
# `wrangler deploy` here builds ../../Dockerfile, pushes the image, and deploys
# the router Worker bound to the container. Requires Docker locally (or a CI
# runner with Docker).

name = "dlx-tms-sandbox-backend"
main = "worker.js"
# Serve the Worker on its <name>.<subdomain>.workers.dev URL (the Pages Function
# calls this as BACKEND_ORIGIN). Enables the route on deploy so it doesn't depend
# on the dashboard toggle.
workers_dev = true
# Containers need a recent runtime + Node compat.
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

# Capture Worker + container stdout/stderr so we can see gunicorn/Flask boot
# output (and any startup traceback) in the dashboard Logs tab.
[observability]
enabled = true

[observability.logs]
enabled = true

[[containers]]
class_name = "Backend"
image = "../../Dockerfile"       # build context is the repo root
max_instances = 1                # single instance: in-memory sessions stay consistent
# Chromium is memory-hungry — use a larger instance. "standard-1" (was
# "standard") is a good default; check `wrangler containers` for sizes on your
# account and adjust if needed.
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "Backend"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Backend"]

# No secrets are needed: credentials arrive at runtime via the login screen and
# are never stored. (Container env is set in the Backend class `envVars`.)
